name: Publish to NPM

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true

          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # For cross-compilation on Linux
      - name: Install Zig (Linux cross-compile)
        if: ${{ matrix.use-cross && runner.os == 'Linux' }}
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        if: ${{ matrix.use-cross && runner.os == 'Linux' }}
        run: cargo install cargo-zigbuild

      - name: Install dependencies
        run: bun install

      - name: Build (Zig cross-compile)
        if: ${{ matrix.use-cross && runner.os == 'Linux' }}
        run: cargo zigbuild --release --target ${{ matrix.target }}
        working-directory: packages/solid-jsx-oxc
        env:
          NAPI_RS_TARGETING_NODEJS: true

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: packages/solid-jsx-oxc
        env:
          NAPI_RS_TARGETING_NODEJS: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: packages/solid-jsx-oxc/target/${{ matrix.target }}/release/*solid_jsx_oxc*
          if-no-files-found: error

  publish:
    name: Publish to NPM
    needs: build-native
    environment: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p packages/solid-jsx-oxc/artifacts
          
          # Map artifact directories to targets
          for target_dir in artifacts/binaries-*/; do
            target="${target_dir%/}"
            target="${target##*-}"
            echo "Processing binaries for $target"
            cp -r "$target_dir"* "packages/solid-jsx-oxc/artifacts/$target/" 2>/dev/null || true
          done

      - name: List organized binaries
        run: find packages/solid-jsx-oxc/artifacts -type f | head -20

      - name: Build npm packages
        run: |
          cd packages/solid-jsx-oxc
          bun run build

      - name: Verify binaries
        run: |
          echo "Verifying native modules..."
          find packages/solid-jsx-oxc -name "*.node" -o -name "*.dll" -o -name "*.dylib" | head -20

      - name: Publish (NPM)
        run: bunx npm publish --registry=https://registry.npmjs.org/ --loglevel info
        working-directory: packages/solid-jsx-oxc
        env:
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
