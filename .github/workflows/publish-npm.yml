name: Publish to NPM

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x86_64
            use-cross: false
 
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
            use-cross: "zig"

          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: windows
            arch: arm64
            use-cross: "msvc"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # For cross-compilation on Linux
      - name: Install Zig (Linux cross-compile)
        id: zig
        if: ${{ matrix.use-cross == 'zig' && runner.os == 'Linux' }}
        uses: mlugg/setup-zig@v2

      - name: Install dependencies
        working-directory: packages/solid-jsx-oxc
        run: bun install

      - name: Create zig cc wrapper
        if: ${{ matrix.use-cross == 'zig' && runner.os == 'Linux' }}
        run: |
          cat << 'EOF' > zig-cc
          #!/usr/bin/env bash
          exec zig cc "$@"
          EOF
          chmod +x zig-cc

      - name: Build (MSVC cross-compile)
        if: ${{ matrix.use-cross == 'msvc' && runner.os == 'Windows' }}
        run: |
          bunx napi build --platform ${{matrix.platform}} --arch ${{matrix.arch}} --release --target ${{matrix.target}} --features napi --no-js --dts binding.d.ts
        working-directory: packages/solid-jsx-oxc
        env:
          NAPI_RS_TARGETING_NODEJS: true
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Build (Zig cross-compile)
        if: ${{ matrix.use-cross == 'zig' && runner.os == 'Linux' }}
        run: |
          bunx napi build --platform ${{matrix.platform}} --arch ${{matrix.arch}} --release --target ${{matrix.target}} --features napi --no-js --dts binding.d.ts
        working-directory: packages/solid-jsx-oxc
        env:
          NAPI_RS_TARGETING_NODEJS: true

          CC: "zig cc"
          CXX: "zig c++"
          AR: "zig ar"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "${{ github.workspace }}/zig-cc"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: "${{ github.workspace }}/zig-cc"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-target -C link-arg=aarch64-linux-gnu"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-target -C link-arg=x86_64-linux-gnu"

          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: bunx napi build --platform --release --features napi --no-js --dts binding.d.ts
        working-directory: packages/solid-jsx-oxc
        env:
          NAPI_RS_TARGETING_NODEJS: true
      
      - name: Debug outputs
        run: |
          ls packages/solid-jsx-oxc

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: natives-${{ matrix.target }}
          path: packages/solid-jsx-oxc/*.node
          archive: false
          if-no-files-found: error

  publish:
    name: Publish to NPM
    needs: build-native
    environment: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p packages/solid-jsx-oxc/artifacts

          # Map artifact directories to targets
          for target_file in artifacts/natives-*; do
            target="${target_file#artifacts/natives-}"
            target="${target%/}"
            echo "Processing binaries for $target"
            mv "$target_file" packages/solid-jsx-oxc/ 2>/dev/null || true
          done

      - name: List organized binaries
        run: find packages/solid-jsx-oxc/artifacts -type f | head -20

      - name: Build npm packages
        run: |
          cd packages/solid-jsx-oxc
          bun run build

      - name: List native modules
        run: find packages/solid-jsx-oxc -name "*.node" -o -name "*.dll" -o -name "*.dylib" | head -20

      - name: Publish (NPM)
        run: bunx npm publish --registry=https://registry.npmjs.org/ --loglevel info
        working-directory: packages/solid-jsx-oxc
        env:
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
